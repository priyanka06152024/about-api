<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* Card */

.logout-account{
width:350px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
gap:18px;
animation:float 3s ease-in-out infinite;
}

/* Username */

.user{
color:white;
font-size:20px;
font-weight:500;
text-align:center;
margin-bottom:10px;
}

/* Inputs */

.title{
padding:12px 15px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.2);
color:white;
font-size:14px;
transition:0.3s ease;
}

.title::placeholder{
color:rgba(255,255,255,0.8);
}

.title:focus{
background:rgba(255,255,255,0.3);
transform:scale(1.02);
}

/* Button */

.btn{
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(45deg,#ff6b6b,#ff8e53);
color:white;
font-size:16px;
font-weight:500;
transition:0.3s ease;
margin-top:10px;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.logout-btn:active{
transform:translateY(0px);
}

/* Floating animation */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

/* Responsive */

@media(max-width:400px){
.logout-account{
width:90%;
}
}</style>
</head>
<body>
    <div class="logout-account">
        <p class="user"></p>
        <input type="text" class="title" id="details" placeholder="Enter Book Title" value="" />
        <input type="text" class="title" id="details" placeholder="Enter Author's Name" value="" />
        <button class="btn">Add Book</button>
        <button id="logout-btn" class="btn">LogOut</button>
    </div>
    <script src="logout.js"></script>
</body>
</html>
