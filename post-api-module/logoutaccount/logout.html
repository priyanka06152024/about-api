<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Background */

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }

        /* Card */

        .logout-account {
            width: 400px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: float 3s ease-in-out infinite;
        }

        /* User Text */

        .user {
            color: white;
            font-size: 22px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* Input Container */

        .all-input {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Inputs */

        .details {
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            transition: 0.3s ease;
        }

        .details::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .details:focus {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        /* Data Paragraph */

        .data {
            color: white;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px;
            border-radius: 10px;
            min-height: 30px;
        }

        /* Buttons */

        .btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: white;
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* Add Another Button */

        .morebook {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
        }

        /* Hide class */

         .hide {
            display: none;
        }

        .show {
            display: block;
        }

        /* Logout Button */

        #logout-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }

        /* Floating animation */

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        

        /* Responsive */

        @media(max-width:450px) {
            .logout-account {
                width: 100%;
            }
        }

       

        /* Responsive */

        @media(max-width:450px) {
            .logout-account {
                width: 100%;
            }
        }


/* Books Container */

#about-books{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:20px;
}

/* Remove link styling */

#about-books a{
text-decoration:none;
color:inherit;
}

/* Card */

.card{
display:flex;
gap:15px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 25px rgba(0,0,0,0.25);
transition:0.3s ease;
cursor:pointer;
}

/* Hover Effect */

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

/* Image */

.photo{
width:90px;
height:120px;
flex-shrink:0;
overflow:hidden;
border-radius:10px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* Content */

.content{
color:white;
display:flex;
flex-direction:column;
gap:5px;
}

/* Text */

.content p{
font-size:14px;
opacity:0.9;
}

.content p:first-child{
font-size:16px;
font-weight:500;
margin-bottom:5px;
}

/* Responsive */

@media(max-width:600px){

.card{
flex-direction:column;
align-items:center;
text-align:center;
}

.photo{
width:100%;
height:200px;
}

}
        
    </style>
</head>

<body>
    <div class="logout-account">
        <p class="user"></p>
      
            <input type="text" id="title" class="details" placeholder="Enter Book Title" value="" />
            <input type="text" id="author" class="details" placeholder="Enter Author's Name" value="" />
            <input type="text" id="category" class="details" placeholder="Enter category" value="" />
            <input type="text" id="publishedYear" class="details" placeholder="Enter publishedYear" value="" />
        
        <div class="data"></div>
        <button class="btn" id="addbtn">Add Book</button>
        <button class="btn morebook hide">Add Another Book</button>
        <button id="logout-btn" class="btn">LogOut</button>
    </div>
    <div id="about-books"></div>
    <script src="logout.js"></script>
</body>

</html>
